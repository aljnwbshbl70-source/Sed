<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SNO ADVANCED DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        .stat-card { border: 1px solid #1a1a1a; background: #050505; transition: 0.3s; }
        .stat-card:hover { border-color: #0f0; transform: translateY(-5px); }
        .btn-sno { border: 1px solid #0f0; }
        .active { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
    </style>
</head>
<body class="p-5 flex flex-col items-center">
    
    <h1 class="text-3xl font-black mb-8 tracking-[0.3em] text-white">SNO SYSTEM v3</h1>

    <div class="mb-5 text-gray-500 text-[10px] uppercase tracking-widest">توجيه التيرمكس (Target Control)</div>
    <div class="grid grid-cols-5 md:grid-cols-10 gap-2 mb-10" id="controls"></div>

    <div class="w-full max-w-5xl">
        <div class="text-right mb-4 text-xs text-green-800 font-bold border-r-4 border-green-500 pr-2">إحصائيات الصيد (Hunting Stats):</div>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="statsGrid">
            </div>
    </div>

    <div class="w-full max-w-5xl mt-10">
        <div class="text-[10px] text-gray-600 mb-2 uppercase">آخر صيدة (Last Hit):</div>
        <div id="lastHit" class="p-4 bg-green-950/20 border border-green-900 text-white text-center italic">
            بانتظار الصيد...
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://user-c912b-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // 1. إنشاء الأزرار وصناديق الإحصائيات
        const controls = document.getElementById('controls');
        const statsGrid = document.getElementById('statsGrid');

        for (let i = 1; i <= 10; i++) {
            // أزرار التحكم
            controls.innerHTML += `
                <button onclick="setLength(${i})" id="btn-${i}" class="btn-sno p-2 rounded text-sm font-bold w-10">${i}</button>
            `;
            // صناديق الإحصائيات
            statsGrid.innerHTML += `
                <div class="stat-card p-4 rounded text-center">
                    <div class="text-[10px] text-gray-500 mb-1 font-bold italic underline">${i} LETTERS</div>
                    <div id="count-${i}" class="text-2xl font-black text-white">0</div>
                </div>
            `;
        }

        // 2. إرسال الأوامر
        function setLength(num) {
            db.ref('settings').set({ targetLength: num });
            document.querySelectorAll('.btn-sno').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + num).classList.add('active');
        }

        // 3. تحديث الإحصائيات (الحساب الحقيقي من سجل الصيد)
        db.ref('hunts').on('value', (snapshot) => {
            const data = snapshot.val();
            const counts = {};
            // تصفير العدادات أولاً
            for(let i=1; i<=10; i++) counts[i] = 0;

            if (data) {
                const entries = Object.values(data);
                entries.forEach(item => {
                    if (counts[item.len]) counts[item.len]++;
                });

                // تحديث الشاشة
                for(let i=1; i<=10; i++) {
                    document.getElementById(`count-${i}`).innerText = counts[i];
                }

                // عرض آخر صيدة
                const last = entries[entries.length - 1];
                document.getElementById('lastHit').innerText = `@${last.user} (طوله: ${last.len})`;
            }
        });

        // مزامنة الزر المختار حالياً
        db.ref('settings/targetLength').on('value', (s) => {
            const val = s.val();
            if(val) {
                document.querySelectorAll('.btn-sno').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-' + val).classList.add('active');
            }
        });
    </script>
</body>
  </html>
